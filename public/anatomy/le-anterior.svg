    <path id="cfv-left" d="M 348,216 L 373,255 L 427,321" data-label="Common femoral vein (left)"><title>Common femoral vein (left)</title></path>
    <path id="sfj-left" d="M 425,326 L 422,342 L 408,368 L 397,400 L 393,398" data-label="Saphenofemoral junction (left)"><title>Saphenofemoral junction (left)</title></path>
    <path id="pfv-left" d="M 438,323 L 456,337 L 467,353 L 483,387 L 503,442 L 533,536 L 542,616" data-label="Profunda (deep femoral) vein (left)"><title>Profunda (deep femoral) vein (left)</title></path>
    <path id="fv-prox-left" d="M 441,342 L 452,374 L 456,397 L 456,437" data-label="Femoral vein (proximal) (left)"><title>Femoral vein (proximal) (left)</title></path>
    <path id="fv-mid-left" d="M 456,437 L 443,601 L 443,644" data-label="Femoral vein (mid) (left)"><title>Femoral vein (mid) (left)</title></path>
    <path id="fv-dist-left" d="M 443,644 L 436,710 L 435,751 L 441,788" data-label="Femoral vein (distal) (left)"><title>Femoral vein (distal) (left)</title></path>
    <path id="gsv-prox-thigh-left" d="M 397,410 L 397,425 L 384,458" data-label="Great saphenous vein (proximal thigh) (left)"><title>Great saphenous vein (proximal thigh) (left)</title></path>
    <path id="gsv-mid-thigh-left" d="M 384,458 L 379,489 L 379,564 L 375,612" data-label="Great saphenous vein (mid thigh) (left)"><title>Great saphenous vein (mid thigh) (left)</title></path>
    <path id="gsv-dist-thigh-left" d="M 375,612 L 375,686 L 380,739 L 384,750 L 388,765 L 390,814 L 396,858 L 403,889" data-label="Great saphenous vein (distal thigh) (left)"><title>Great saphenous vein (distal thigh) (left)</title></path>
    <path id="gsv-knee-left" d="M 387,895 Q 390,920 393,940" data-label="Great saphenous vein (at the knee) (left)"><title>Great saphenous vein (at the knee) (left)</title></path>
    <path id="gsv-calf-left" d="M 403,889 L 408,956 L 408,1021 L 402,1046 L 401,1071 L 399,1079 L 399,1139 L 423,1209 L 426,1228 L 425,1330 L 430,1369 L 430,1405 L 434,1423 L 440,1427" data-label="Great saphenous vein (calf) (left)"><title>Great saphenous vein (calf) (left)</title></path>
    <path id="pop-ak-left" d="M 442,795 L 443,839" data-label="Popliteal vein (above knee) (left)"><title>Popliteal vein (above knee) (left)</title></path>
    <path id="pop-bk-left" d="M 443,839 L 460,902" data-label="Popliteal vein (below knee) (left)"><title>Popliteal vein (below knee) (left)</title></path>
    <path id="ptv-left" d="M 459,895 L 459,1166 L 468,1261 L 468,1331 L 471,1346 L 474,1349" data-label="Posterior tibial vein (left)"><title>Posterior tibial vein (left)</title></path>
    <path id="per-left" d="M 459,895 L 459,1166 L 468,1261 L 468,1331 L 471,1346 L 474,1349" data-label="Peroneal vein (left)"><title>Peroneal vein (left)</title></path>
    <!-- ===== Posterior-only segments merged into the single combined view ===== -->
    <path id="spj-right" d="M 222,895 Q 213,895 205,895" data-label="Saphenopopliteal junction (right)"><title>Saphenopopliteal junction (right)</title></path>
    <path id="ssv-right" d="M 126,911 L 125,926 L 111,963 L 104,999 L 104,1046 L 91,1117 L 82,1237" data-label="Small saphenous vein (right)"><title>Small saphenous vein (right)</title></path>
    <path id="gastroc-right" d="M 188,990 Q 175,1060 180,1140" data-label="Gastrocnemius vein (right)"><title>Gastrocnemius vein (right)</title></path>
    <path id="spj-left" d="M 378,895 Q 387,895 395,895" data-label="Saphenopopliteal junction (left)"><title>Saphenopopliteal junction (left)</title></path>
    <path id="ssv-left" d="M 467,904 L 467,908 L 479,933 L 488,967 L 501,1110 L 502,1168 L 510,1204 L 512,1225" data-label="Small saphenous vein (left)"><title>Small saphenous vein (left)</title></path>
    <path id="gastroc-left" d="M 412,990 Q 425,1060 420,1140" data-label="Gastrocnemius vein (left)"><title>Gastrocnemius vein (left)</title></path>
  </g>
</svg>
