<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1453" role="img" aria-labelledby="title-le-anterior">
  <title id="title-le-anterior">Lower-extremity venous system — anterior view</title>
  <desc>Reference-image backdrop with invisible click-overlay paths. Each segment carries a canonical id (cfv-left, gsv-prox-thigh-right, etc.) matching the IAC/SVU venous duplex protocol. Path coordinates are calibrated to the line-art veins in le-reference.png; deep-vein columns taper medially as the thigh narrows toward the knee.</desc>
  <image id="backdrop" href="/anatomy/le-reference.png" x="0" y="0" width="600" height="1453" preserveAspectRatio="xMidYMid meet" />
  <!-- Empty placeholder groups so colorizeSvg's regex transforms find them. -->
  <g id="silhouette" stroke="transparent"></g>
  <g id="pelvis-hint" stroke="transparent"></g>
  <g id="side-labels" fill="transparent"></g>
  <!-- Click-overlay paths. fill=transparent + stroke=transparent makes them invisible until colored. -->
  <g id="segments" fill="transparent" stroke="transparent" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" pointer-events="all">
    <!-- ===== RIGHT LEG (anatomical right = visual left half of image) ===== -->
    <path id="cfv-right" d="M 238,224 L 224,245 L 190,281 L 169,308 L 162,324 L 157,328" data-label="Common femoral vein (right)"><title>Common femoral vein (right)</title></path>
    <path id="sfj-right" d="M 174,324 L 174,336 L 185,366 L 191,391 L 194,395" data-label="Saphenofemoral junction (right)"><title>Saphenofemoral junction (right)</title></path>
    <path id="pfv-right" d="M 148,332 L 130,347 L 116,372 L 107,416 L 93,456 L 81,513 L 50,628" data-label="Profunda (deep femoral) vein (right)"><title>Profunda (deep femoral) vein (right)</title></path>
    <path id="fv-prox-right" d="M 156,346 L 153,358 L 140,385 L 139,400 L 140,451" data-label="Femoral vein (proximal) (right)"><title>Femoral vein (proximal) (right)</title></path>
    <path id="fv-mid-right" d="M 140,451 L 145,494 L 149,595 L 150,602 L 153,600 L 153,586 L 147,559 L 144,509 L 146,501 L 147,650 L 149,657 L 150,649 L 150,610 L 152,603 L 153,646 L 157,698 L 157,673" data-label="Femoral vein (mid) (right)"><title>Femoral vein (mid) (right)</title></path>
    <path id="fv-dist-right" d="M 153,646 L 160,706 L 160,732 L 157,698 L 157,673 L 163,772 L 162,797 L 156,807 L 152,811 L 151,809 L 153,803 L 156,709 L 150,684" data-label="Femoral vein (distal) (right)"><title>Femoral vein (distal) (right)</title></path>
    <path id="gsv-prox-thigh-right" d="M 200,414 L 200,436" data-label="Great saphenous vein (proximal thigh) (right)"><title>Great saphenous vein (proximal thigh) (right)</title></path>
    <path id="gsv-mid-thigh-right" d="M 200,436 L 213,495 L 219,539 L 219,628" data-label="Great saphenous vein (mid thigh) (right)"><title>Great saphenous vein (mid thigh) (right)</title></path>
    <path id="gsv-dist-thigh-right" d="M 219,628 L 204,721 L 204,796 L 204,809 L 204,866" data-label="Great saphenous vein (distal thigh) (right)"><title>Great saphenous vein (distal thigh) (right)</title></path>
    <path id="gsv-knee-right" d="M 204,866 L 188,925" data-label="Great saphenous vein (at the knee) (right)"><title>Great saphenous vein (at the knee) (right)</title></path>
    <path id="gsv-calf-right" d="M 188,925 L 184,948 L 185,1009 L 195,1049 L 198,1078 L 196,1086 L 196,1109 L 187,1144 L 173,1228 L 172,1297 L 162,1366 L 158,1422 L 153,1426" data-label="Great saphenous vein (calf) (right)"><title>Great saphenous vein (calf) (right)</title></path>
    <path id="pop-ak-right" d="M 151,820 L 149,838" data-label="Popliteal vein (above knee) (right)"><title>Popliteal vein (above knee) (right)</title></path>
    <path id="pop-bk-right" d="M 149,838 L 132,896 L 131,914" data-label="Popliteal vein (below knee) (right)"><title>Popliteal vein (below knee) (right)</title></path>
    <path id="ptv-right" d="M 146,897 L 138,949 L 134,1067 L 134,1082 L 139,1110 L 139,1158 L 130,1226 L 132,1204 L 132,1249 L 126,1289 L 116,1326 L 125,1280 L 125,1335 L 123,1344" data-label="Posterior tibial vein (right)"><title>Posterior tibial vein (right)</title></path>
    <path id="per-right" d="M 146,897 L 138,949 L 134,1067 L 134,1082 L 139,1110 L 139,1158 L 130,1226 L 132,1204 L 132,1249 L 126,1289 L 116,1326 L 125,1280 L 125,1335 L 123,1344" data-label="Peroneal vein (right)"><title>Peroneal vein (right)</title></path>
