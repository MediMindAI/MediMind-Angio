<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1453" role="img" aria-labelledby="title-le-posterior">
  <title id="title-le-posterior">Lower-extremity venous system — posterior view</title>
  <desc>Reference-image backdrop with invisible click-overlay paths for the posterior-visible segments. Shares the bilateral reference image with the anterior view. Coordinates calibrated to the line-art veins in le-reference.png.</desc>
  <image id="backdrop" href="/anatomy/le-reference.png" x="0" y="0" width="600" height="1453" preserveAspectRatio="xMidYMid meet" />
  <!-- Empty placeholder groups so colorizeSvg's regex transforms find them. -->
  <g id="silhouette" stroke="transparent"></g>
  <g id="pelvis-hint" stroke="transparent"></g>
  <g id="side-labels" fill="transparent"></g>
  <!-- Posterior-visible segments only: pop-ak, pop-bk, spj, ssv, gastroc, soleal, ptv, per, gsv-calf -->
  <g id="segments" fill="transparent" stroke="transparent" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" pointer-events="all">
    <!-- ===== RIGHT LEG ===== -->
    <path id="pop-ak-right" d="M 151,820 L 149,838" data-label="Popliteal vein (above knee) (right)"><title>Popliteal vein (above knee) (right)</title></path>
    <path id="pop-bk-right" d="M 149,838 L 132,896 L 131,914" data-label="Popliteal vein (below knee) (right)"><title>Popliteal vein (below knee) (right)</title></path>
    <path id="spj-right" d="M 222,895 Q 213,895 205,895" data-label="Saphenopopliteal junction (right)"><title>Saphenopopliteal junction (right)</title></path>
    <path id="ssv-right" d="M 126,911 L 125,926 L 111,963 L 104,999 L 104,1046 L 91,1117 L 82,1237" data-label="Small saphenous vein (right)"><title>Small saphenous vein (right)</title></path>
    <path id="gastroc-right" d="M 188,990 Q 175,1060 180,1140" data-label="Gastrocnemius vein (right)"><title>Gastrocnemius vein (right)</title></path>
    <path id="ptv-right" d="M 146,897 L 138,949 L 134,1067 L 134,1082 L 139,1110 L 139,1158 L 130,1226 L 132,1204 L 132,1249 L 126,1289 L 116,1326 L 125,1280 L 125,1335 L 123,1344" data-label="Posterior tibial vein (right)"><title>Posterior tibial vein (right)</title></path>
    <path id="per-right" d="M 146,897 L 138,949 L 134,1067 L 134,1082 L 139,1110 L 139,1158 L 130,1226 L 132,1204 L 132,1249 L 126,1289 L 116,1326 L 125,1280 L 125,1335 L 123,1344" data-label="Peroneal vein (right)"><title>Peroneal vein (right)</title></path>
    <path id="gsv-calf-right" d="M 188,925 L 184,948 L 185,1009 L 195,1049 L 198,1078 L 196,1086 L 196,1109 L 187,1144 L 173,1228 L 172,1297 L 162,1366 L 158,1422 L 153,1426" data-label="Great saphenous vein (calf) (right)"><title>Great saphenous vein (calf) (right)</title></path>
    <!-- ===== LEFT LEG ===== -->
    <path id="pop-ak-left" d="M 442,795 L 443,839" data-label="Popliteal vein (above knee) (left)"><title>Popliteal vein (above knee) (left)</title></path>
    <path id="pop-bk-left" d="M 443,839 L 460,902" data-label="Popliteal vein (below knee) (left)"><title>Popliteal vein (below knee) (left)</title></path>
    <path id="spj-left" d="M 378,895 Q 387,895 395,895" data-label="Saphenopopliteal junction (left)"><title>Saphenopopliteal junction (left)</title></path>
    <path id="ssv-left" d="M 467,904 L 467,908 L 479,933 L 488,967 L 501,1110 L 502,1168 L 510,1204 L 512,1225" data-label="Small saphenous vein (left)"><title>Small saphenous vein (left)</title></path>
    <path id="gastroc-left" d="M 412,990 Q 425,1060 420,1140" data-label="Gastrocnemius vein (left)"><title>Gastrocnemius vein (left)</title></path>
    <path id="ptv-left" d="M 459,895 L 459,1166 L 468,1261 L 468,1331 L 471,1346 L 474,1349" data-label="Posterior tibial vein (left)"><title>Posterior tibial vein (left)</title></path>
    <path id="per-left" d="M 459,895 L 459,1166 L 468,1261 L 468,1331 L 471,1346 L 474,1349" data-label="Peroneal vein (left)"><title>Peroneal vein (left)</title></path>
    <path id="gsv-calf-left" d="M 403,889 L 408,956 L 408,1021 L 402,1046 L 401,1071 L 399,1079 L 399,1139 L 423,1209 L 426,1228 L 425,1330 L 430,1369 L 430,1405 L 434,1423 L 440,1427" data-label="Great saphenous vein (calf) (left)"><title>Great saphenous vein (calf) (left)</title></path>
  </g>
</svg>
